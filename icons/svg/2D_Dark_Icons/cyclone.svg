<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- cyclone body: cylinder + cone -->
  <rect x="14" y="6" width="20" height="16" rx="3" fill="#2a3548" stroke="#b0c4de" stroke-width="2"/>
  <polygon points="14,22 34,22 24,44" fill="#2a3548" stroke="#b0c4de" stroke-width="2" stroke-linejoin="round"/>
  <!-- inner vortex tube (dip tube) -->
  <rect x="20" y="6" width="8" height="12" rx="0" fill="#1e2d40" stroke="#6e7a90" stroke-width="1"/>
  <!-- tangential inlet (right side, top of cylinder) -->
  <line x1="34" y1="12" x2="44" y2="12" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="34,12 38,10 38,14" fill="#3a8fd1"/>
  <!-- gas outlet (top centre) -->
  <line x1="24" y1="6" x2="24" y2="2" stroke="#5cb85c" stroke-width="2"/>
  <polygon points="24,2 21,6 27,6" fill="#5cb85c"/>
  <!-- solids / liquid outlet (bottom) -->
  <line x1="24" y1="44" x2="24" y2="47" stroke="#e8a020" stroke-width="2"/>
  <polygon points="24,47 21,43 27,43" fill="#e8a020"/>
  <!-- swirl arrow -->
  <path d="M18,15 Q16,10 22,9" stroke="#3a8fd1" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <polygon points="22,9 19,7 18,11" fill="#3a8fd1"/>
</svg>

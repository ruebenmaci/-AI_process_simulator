<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- outer casing -->
  <circle cx="24" cy="24" r="16" fill="#2a3548" stroke="#b0c4de" stroke-width="2"/>
  <!-- bowl (inner) -->
  <circle cx="24" cy="24" r="9" fill="#1e2d40" stroke="#6e7a90" stroke-width="1.5"/>
  <!-- spin arms -->
  <line x1="24" y1="24" x2="24" y2="15" stroke="#3a8fd1" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="32" y2="29" stroke="#3a8fd1" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="16" y2="29" stroke="#3a8fd1" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="24" r="3" fill="#3a8fd1"/>
  <!-- drive shaft top -->
  <line x1="24" y1="8" x2="24" y2="4" stroke="#b0c4de" stroke-width="2"/>
  <rect x="20" y="2" width="8" height="3" rx="1" fill="#e8a020"/>
  <!-- inlet top -->
  <line x1="32" y1="8" x2="38" y2="4" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="38,4 35,7 39,8" fill="#3a8fd1"/>
  <!-- cake outlet bottom -->
  <line x1="24" y1="40" x2="24" y2="45" stroke="#e8a020" stroke-width="2"/>
  <polygon points="24,45 21,41 27,41" fill="#e8a020"/>
  <!-- filtrate outlet -->
  <line x1="32" y1="38" x2="38" y2="43" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="38,43 34,42 35,46" fill="#3a8fd1"/>
</svg>

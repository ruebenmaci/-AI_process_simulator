<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- vertical vessel -->
  <ellipse cx="24" cy="10" rx="12" ry="4" fill="#243040" stroke="#b0c4de" stroke-width="2"/>
  <rect x="12" y="10" width="24" height="30" fill="#2a3548" stroke="#b0c4de" stroke-width="2"/>
  <ellipse cx="24" cy="40" rx="12" ry="4" fill="#1e2d40" stroke="#b0c4de" stroke-width="2"/>
  <!-- phase layers -->
  <ellipse cx="24" cy="26" rx="12" ry="3" fill="#1e3a5f" stroke="#3a8fd1" stroke-width="1" stroke-dasharray="2,2"/>
  <ellipse cx="24" cy="33" rx="12" ry="3" fill="#2a1a10" stroke="#e8a020" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- vapor out top -->
  <line x1="24" y1="6" x2="24" y2="2" stroke="#5cb85c" stroke-width="2"/>
  <polygon points="24,2 21,6 27,6" fill="#5cb85c"/>
  <!-- water out bottom -->
  <line x1="36" y1="38" x2="44" y2="40" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="44,40 40,38 41,42" fill="#3a8fd1"/>
  <!-- HC liquid mid -->
  <line x1="36" y1="30" x2="44" y2="30" stroke="#e8a020" stroke-width="2"/>
  <polygon points="44,30 41,28 41,32" fill="#e8a020"/>
  <!-- feed in -->
  <line x1="3" y1="20" x2="12" y2="20" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="12,20 9,18 9,22" fill="#3a8fd1"/>
</svg>

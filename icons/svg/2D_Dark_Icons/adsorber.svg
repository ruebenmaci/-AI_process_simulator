<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- two vessels side by side (PSA twin-bed) -->
  <!-- vessel A -->
  <ellipse cx="14" cy="11" rx="7" ry="3" fill="#2a3548" stroke="#b0c4de" stroke-width="1.5"/>
  <rect x="7" y="11" width="14" height="22" fill="#2a3548" stroke="#b0c4de" stroke-width="1.5"/>
  <ellipse cx="14" cy="33" rx="7" ry="3" fill="#1e2d40" stroke="#b0c4de" stroke-width="1.5"/>
  <!-- vessel A fill (adsorbent) -->
  <rect x="8" y="13" width="12" height="18" fill="#1e2d40"/>
  <circle cx="11" cy="17" r="1.5" fill="#e8a020" opacity="0.6"/>
  <circle cx="16" cy="17" r="1.5" fill="#e8a020" opacity="0.6"/>
  <circle cx="11" cy="23" r="1.5" fill="#e8a020" opacity="0.6"/>
  <circle cx="16" cy="23" r="1.5" fill="#e8a020" opacity="0.6"/>
  <circle cx="11" cy="29" r="1.5" fill="#e8a020" opacity="0.6"/>
  <circle cx="16" cy="29" r="1.5" fill="#e8a020" opacity="0.6"/>
  <!-- vessel B -->
  <ellipse cx="34" cy="11" rx="7" ry="3" fill="#2a3548" stroke="#b0c4de" stroke-width="1.5"/>
  <rect x="27" y="11" width="14" height="22" fill="#2a3548" stroke="#b0c4de" stroke-width="1.5"/>
  <ellipse cx="34" cy="33" rx="7" ry="3" fill="#1e2d40" stroke="#b0c4de" stroke-width="1.5"/>
  <rect x="28" y="13" width="12" height="18" fill="#1e2d40"/>
  <circle cx="31" cy="17" r="1.5" fill="#e8a020" opacity="0.6"/>
  <circle cx="36" cy="17" r="1.5" fill="#e8a020" opacity="0.6"/>
  <circle cx="31" cy="23" r="1.5" fill="#e8a020" opacity="0.6"/>
  <circle cx="36" cy="23" r="1.5" fill="#e8a020" opacity="0.6"/>
  <circle cx="31" cy="29" r="1.5" fill="#e8a020" opacity="0.6"/>
  <circle cx="36" cy="29" r="1.5" fill="#e8a020" opacity="0.6"/>
  <!-- connecting pipe between tops -->
  <line x1="21" y1="11" x2="27" y2="11" stroke="#b0c4de" stroke-width="1.5"/>
  <!-- product out top-right -->
  <line x1="34" y1="8" x2="34" y2="4" stroke="#5cb85c" stroke-width="2"/>
  <polygon points="34,4 31,8 37,8" fill="#5cb85c"/>
  <!-- feed in bottom-left -->
  <line x1="14" y1="36" x2="14" y2="40" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="14,36 11,40 17,40" fill="#3a8fd1"/>
  <!-- waste out bottom-right -->
  <line x1="34" y1="36" x2="34" y2="40" stroke="#6e7a90" stroke-width="1.5"/>
  <polygon points="34,40 31,36 37,36" fill="#6e7a90"/>
</svg>

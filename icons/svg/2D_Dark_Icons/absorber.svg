<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect x="16" y="6" width="16" height="36" rx="4" fill="#2a3548" stroke="#b0c4de" stroke-width="2"/>
  <!-- packing fill -->
  <rect x="17" y="12" width="14" height="24" fill="#1e2d40" rx="1"/>
  <!-- crosshatch packing texture -->
  <line x1="17" y1="15" x2="31" y2="19" stroke="#3a8fd1" stroke-width="0.8" opacity="0.6"/>
  <line x1="31" y1="15" x2="17" y2="19" stroke="#3a8fd1" stroke-width="0.8" opacity="0.6"/>
  <line x1="17" y1="21" x2="31" y2="25" stroke="#3a8fd1" stroke-width="0.8" opacity="0.6"/>
  <line x1="31" y1="21" x2="17" y2="25" stroke="#3a8fd1" stroke-width="0.8" opacity="0.6"/>
  <line x1="17" y1="27" x2="31" y2="31" stroke="#3a8fd1" stroke-width="0.8" opacity="0.6"/>
  <line x1="31" y1="27" x2="17" y2="31" stroke="#3a8fd1" stroke-width="0.8" opacity="0.6"/>
  <!-- liquid in top-left -->
  <line x1="4" y1="10" x2="16" y2="10" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="16,10 12,8 12,12" fill="#3a8fd1"/>
  <!-- gas in bottom-left -->
  <line x1="4" y1="38" x2="16" y2="38" stroke="#5cb85c" stroke-width="2"/>
  <polygon points="16,38 12,36 12,40" fill="#5cb85c"/>
  <!-- gas out top-right -->
  <line x1="32" y1="10" x2="44" y2="10" stroke="#5cb85c" stroke-width="2"/>
  <polygon points="44,10 40,8 40,12" fill="#5cb85c"/>
  <!-- liquid out bottom-right -->
  <line x1="32" y1="38" x2="44" y2="38" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="44,38 40,36 40,40" fill="#3a8fd1"/>
</svg>

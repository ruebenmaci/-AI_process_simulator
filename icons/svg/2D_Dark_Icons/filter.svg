<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect x="8" y="12" width="32" height="24" rx="4" fill="#2a3548" stroke="#b0c4de" stroke-width="2"/>
  <!-- filter medium (hatched area) -->
  <rect x="20" y="12" width="8" height="24" fill="#1e2d40"/>
  <!-- hatch lines -->
  <line x1="20" y1="14" x2="28" y2="20" stroke="#b0c4de" stroke-width="0.8" opacity="0.5"/>
  <line x1="20" y1="19" x2="28" y2="25" stroke="#b0c4de" stroke-width="0.8" opacity="0.5"/>
  <line x1="20" y1="24" x2="28" y2="30" stroke="#b0c4de" stroke-width="0.8" opacity="0.5"/>
  <line x1="20" y1="29" x2="28" y2="35" stroke="#b0c4de" stroke-width="0.8" opacity="0.5"/>
  <!-- dividing lines -->
  <line x1="20" y1="12" x2="20" y2="36" stroke="#b0c4de" stroke-width="1.5"/>
  <line x1="28" y1="12" x2="28" y2="36" stroke="#b0c4de" stroke-width="1.5"/>
  <!-- inlet/outlet -->
  <line x1="3" y1="24" x2="8" y2="24" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="8,24 5,22 5,26" fill="#3a8fd1"/>
  <line x1="40" y1="24" x2="45" y2="24" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="45,24 42,22 42,26" fill="#3a8fd1"/>
  <!-- drain -->
  <line x1="24" y1="36" x2="24" y2="42" stroke="#6e7a90" stroke-width="1.5" stroke-dasharray="2,2"/>
  <polygon points="24,42 21,38 27,38" fill="#6e7a90"/>
</svg>

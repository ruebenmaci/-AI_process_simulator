<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="clg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#b0d0f0"/>
    </linearGradient>
  </defs>
  <!-- table background -->
  <rect x="4" y="6" width="40" height="38" rx="4" fill="url(#clg)" stroke="#4080c0" stroke-width="1.5"/>
  <!-- header row -->
  <rect x="4" y="6" width="40" height="10" rx="4" fill="#2060a0"/>
  <rect x="4" y="10" width="40" height="6" rx="0" fill="#2060a0"/>
  <text x="24" y="14" text-anchor="middle" font-size="6.5" fill="white" font-family="Arial" font-weight="bold">COMPONENTS</text>
  <!-- col divider -->
  <line x1="26" y1="6" x2="26" y2="44" stroke="#80b0d8" stroke-width="1"/>
  <!-- rows -->
  <line x1="4" y1="22" x2="44" y2="22" stroke="#80b0d8" stroke-width="0.8"/>
  <line x1="4" y1="29" x2="44" y2="29" stroke="#80b0d8" stroke-width="0.8"/>
  <line x1="4" y1="36" x2="44" y2="36" stroke="#80b0d8" stroke-width="0.8"/>
  <!-- colored component dots -->
  <circle cx="12" cy="18" r="3" fill="#e84040"/>
  <circle cx="12" cy="25.5" r="3" fill="#40c040"/>
  <circle cx="12" cy="32.5" r="3" fill="#4080e0"/>
  <circle cx="12" cy="40" r="3" fill="#e0a020"/>
  <!-- name stubs -->
  <rect x="18" y="15.5" width="6" height="4" rx="1" fill="#2060a0" opacity="0.4"/>
  <rect x="18" y="22.5" width="8" height="4" rx="1" fill="#2060a0" opacity="0.3"/>
  <rect x="18" y="29.5" width="5" height="4" rx="1" fill="#2060a0" opacity="0.4"/>
  <rect x="18" y="37" width="7" height="4" rx="1" fill="#2060a0" opacity="0.3"/>
</svg>

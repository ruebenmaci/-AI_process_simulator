<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="prg" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#a0c8e8"/>
      <stop offset="60%" stop-color="#3070b0"/>
      <stop offset="100%" stop-color="#103060"/>
    </radialGradient>
  </defs>
  <!-- pump casing (circle) -->
  <circle cx="24" cy="24" r="15" fill="url(#prg)" stroke="#103060" stroke-width="1.8"/>
  <!-- highlight -->
  <ellipse cx="20" cy="19" rx="5" ry="4" fill="white" opacity="0.2"/>
  <!-- volute scroll indicator -->
  <path d="M24,24 Q30,20 30,14 Q24,10 17,14 Q12,19 16,24 Q18,28 24,24Z" fill="none" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <!-- impeller dot -->
  <circle cx="24" cy="24" r="4" fill="#6aafe0" stroke="white" stroke-width="1"/>
  <circle cx="24" cy="24" r="2" fill="white" opacity="0.6"/>
  <!-- inlet stub (left) -->
  <rect x="2" y="21" width="9" height="6" rx="3" fill="#4080b0" stroke="#103060" stroke-width="1"/>
  <!-- outlet stub (right/top) -->
  <rect x="37" y="21" width="9" height="6" rx="3" fill="#4080b0" stroke="#103060" stroke-width="1"/>
  <!-- energy (bottom) -->
  <rect x="21" y="39" width="6" height="6" rx="2" fill="#f07820" stroke="#a03010" stroke-width="1"/>
</svg>

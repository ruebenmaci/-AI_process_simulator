<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="phg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0c8e0"/>
      <stop offset="100%" stop-color="#505880"/>
    </linearGradient>
  </defs>
  <!-- frame plates (end plates) -->
  <rect x="6" y="8" width="6" height="34" rx="2" fill="url(#phg)" stroke="#303858" stroke-width="1.5"/>
  <rect x="36" y="8" width="6" height="34" rx="2" fill="url(#phg)" stroke="#303858" stroke-width="1.5"/>
  <rect x="7" y="9" width="4" height="10" rx="1" fill="white" opacity="0.2"/>
  <!-- plate stack between -->
  <rect x="12" y="10" width="24" height="30" fill="#2a3060" stroke="#1a2050" stroke-width="1"/>
  <!-- plate dividers with alternating hot/cold colors -->
  <rect x="12" y="10" width="5" height="30" fill="#d06020" opacity="0.7"/>
  <rect x="17" y="10" width="5" height="30" fill="#2080c0" opacity="0.7"/>
  <rect x="22" y="10" width="5" height="30" fill="#d06020" opacity="0.7"/>
  <rect x="27" y="10" width="5" height="30" fill="#2080c0" opacity="0.7"/>
  <rect x="32" y="10" width="4" height="30" fill="#d06020" opacity="0.7"/>
  <!-- plate separator lines -->
  <line x1="17" y1="10" x2="17" y2="40" stroke="#1a2050" stroke-width="1"/>
  <line x1="22" y1="10" x2="22" y2="40" stroke="#1a2050" stroke-width="1"/>
  <line x1="27" y1="10" x2="27" y2="40" stroke="#1a2050" stroke-width="1"/>
  <line x1="32" y1="10" x2="32" y2="40" stroke="#1a2050" stroke-width="1"/>
  <!-- hot ports (top left, bottom right) -->
  <rect x="10" y="4" width="5" height="6" rx="2.5" fill="#d06020" stroke="#802000" stroke-width="1"/>
  <rect x="33" y="40" width="5" height="6" rx="2.5" fill="#d06020" stroke="#802000" stroke-width="1"/>
  <!-- cold ports (top right, bottom left) -->
  <rect x="33" y="4" width="5" height="6" rx="2.5" fill="#2080c0" stroke="#083070" stroke-width="1"/>
  <rect x="10" y="40" width="5" height="6" rx="2.5" fill="#2080c0" stroke="#083070" stroke-width="1"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="pidg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8898b8"/>
      <stop offset="100%" stop-color="#e8eef8"/>
    </linearGradient>
  </defs>
  <!-- controller box -->
  <rect x="6" y="8" width="36" height="32" rx="5" fill="url(#pidg)" stroke="#f07820" stroke-width="2"/>
  <rect x="8" y="10" width="32" height="10" rx="3" fill="#1a2838" stroke="none"/>
  <!-- PID label (orange, prominent) -->
  <text x="24" y="19" text-anchor="middle" font-size="10" fill="#f07820" font-family="Arial" font-weight="bold">PID</text>
  <!-- response curve on display -->
  <rect x="9" y="22" width="30" height="14" rx="2" fill="#0a1018"/>
  <path d="M11,33 L15,33 Q17,24 20,27 Q22,30 25,22 Q27,18 30,24 L35,24" fill="none" stroke="#40e040" stroke-width="1.5" stroke-linecap="round"/>
  <!-- setpoint -->
  <line x1="11" y1="27" x2="35" y2="27" stroke="#f04040" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- I/O signal stubs -->
  <rect x="21" y="40" width="6" height="6" rx="2" fill="#f07820" stroke="#a03010" stroke-width="1"/>
  <rect x="2" y="22" width="6" height="5" rx="2" fill="#f07820" stroke="#a03010" stroke-width="1"/>
</svg>

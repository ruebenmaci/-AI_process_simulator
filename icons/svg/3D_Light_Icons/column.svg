<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="dcg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4090d0"/>
      <stop offset="40%" stop-color="#70b8f0"/>
      <stop offset="100%" stop-color="#1060a0"/>
    </linearGradient>
  </defs>
  <!-- column cylinder -->
  <ellipse cx="24" cy="8" rx="10" ry="3.5" fill="#3080c8" stroke="#1060a0" stroke-width="1.5"/>
  <rect x="14" y="8" width="20" height="34" fill="url(#dcg)" stroke="#1060a0" stroke-width="1.5"/>
  <ellipse cx="24" cy="42" rx="10" ry="3.5" fill="#1a60a8" stroke="#1060a0" stroke-width="1.5"/>
  <!-- highlight stripe -->
  <rect x="15" y="9" width="6" height="32" rx="3" fill="white" opacity="0.15"/>
  <!-- tray lines -->
  <line x1="14" y1="16" x2="34" y2="16" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="14" y1="22" x2="34" y2="22" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="14" y1="28" x2="34" y2="28" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="14" y1="34" x2="34" y2="34" stroke="white" stroke-width="1" opacity="0.5"/>
  <!-- overhead nozzle -->
  <rect x="20" y="3" width="8" height="5" rx="2.5" fill="#5aafe8" stroke="#1060a0" stroke-width="1"/>
  <!-- bottoms nozzle -->
  <rect x="20" y="44" width="8" height="4" rx="2" fill="#5aafe8" stroke="#1060a0" stroke-width="1"/>
  <!-- feed nozzle left -->
  <rect x="4" y="22" width="10" height="4" rx="2" fill="#5aafe8" stroke="#1060a0" stroke-width="1"/>
  <!-- sidedraw right -->
  <rect x="34" y="16" width="10" height="4" rx="2" fill="#5aafe8" stroke="#1060a0" stroke-width="1"/>
</svg>

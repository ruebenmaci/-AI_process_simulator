<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- pipe body -->
  <rect x="4" y="20" width="34" height="8" rx="4" fill="url(#pg)" stroke="#1a5c8a" stroke-width="1.5"/>
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ec6f0"/>
      <stop offset="40%" stop-color="#2196cc"/>
      <stop offset="100%" stop-color="#0d5a8a"/>
    </linearGradient>
  </defs>
  <!-- highlight stripe -->
  <rect x="6" y="21" width="30" height="2.5" rx="1.2" fill="white" opacity="0.35"/>
  <!-- arrowhead -->
  <polygon points="44,24 36,19 36,29" fill="#1a7abf" stroke="#0d5a8a" stroke-width="1"/>
  <!-- highlight on arrow -->
  <polygon points="44,24 36,19 40,24" fill="white" opacity="0.2"/>
</svg>

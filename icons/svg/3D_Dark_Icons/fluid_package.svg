<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="fpg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8090c8"/>
      <stop offset="100%" stop-color="#303878"/>
    </linearGradient>
  </defs>
  <!-- book / manual shape -->
  <rect x="8" y="6" width="30" height="38" rx="3" fill="url(#fpg)" stroke="#202870" stroke-width="1.5"/>
  <!-- spine -->
  <rect x="8" y="6" width="7" height="38" rx="3" fill="#202870" stroke="#202870" stroke-width="1"/>
  <!-- pages highlight -->
  <rect x="16" y="7" width="20" height="36" rx="1" fill="white" opacity="0.12"/>
  <!-- content lines -->
  <line x1="17" y1="14" x2="35" y2="14" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="17" y1="19" x2="35" y2="19" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="17" y1="24" x2="35" y2="24" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="17" y1="29" x2="30" y2="29" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- PR badge -->
  <circle cx="34" cy="10" r="8" fill="#f07820" stroke="#a03010" stroke-width="1.5"/>
  <text x="34" y="14" text-anchor="middle" font-size="8" fill="white" font-family="Arial" font-weight="bold">PR</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="cndg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0e8ff"/>
      <stop offset="50%" stop-color="#4090c8"/>
      <stop offset="100%" stop-color="#1050a0"/>
    </linearGradient>
    <linearGradient id="cwg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80d0ff"/>
      <stop offset="100%" stop-color="#0070c0"/>
    </linearGradient>
  </defs>
  <!-- shell -->
  <ellipse cx="10" cy="24" rx="4" ry="12" fill="#1050a0" stroke="#083070" stroke-width="1.2"/>
  <rect x="10" y="12" width="28" height="24" fill="url(#cndg)" stroke="#083070" stroke-width="1.5"/>
  <ellipse cx="38" cy="24" rx="4" ry="12" fill="url(#cndg)" stroke="#083070" stroke-width="1.2"/>
  <rect x="11" y="13" width="26" height="6" rx="0" fill="white" opacity="0.22"/>
  <!-- cold water band (blue) -->
  <rect x="10" y="20" width="28" height="8" fill="url(#cwg)" opacity="0.6"/>
  <rect x="11" y="21" width="26" height="2" fill="white" opacity="0.2"/>
  <!-- snowflake overlay -->
  <line x1="24" y1="19" x2="24" y2="29" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="19" y1="24" x2="29" y2="24" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="21" y1="21" x2="27" y2="27" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="27" y1="21" x2="21" y2="27" stroke="white" stroke-width="1" opacity="0.5"/>
  <!-- nozzles: vapor in, liquid out, CW in/out -->
  <rect x="2" y="18" width="8" height="4" rx="2" fill="#5cb85c" stroke="#2a7a2a" stroke-width="1"/>
  <rect x="38" y="26" width="8" height="4" rx="2" fill="#3070b0" stroke="#083070" stroke-width="1"/>
  <rect x="2" y="27" width="8" height="4" rx="2" fill="#40c0ff" stroke="#0080c0" stroke-width="1"/>
  <rect x="38" y="18" width="8" height="4" rx="2" fill="#40c0ff" stroke="#0080c0" stroke-width="1"/>
</svg>

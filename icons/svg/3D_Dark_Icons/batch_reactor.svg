<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="brg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4090d0"/>
      <stop offset="50%" stop-color="#80c0f0"/>
      <stop offset="100%" stop-color="#1060a0"/>
    </linearGradient>
  </defs>
  <!-- dished head top -->
  <path d="M12,18 Q12,8 24,8 Q36,8 36,18" fill="#3080c8" stroke="#083070" stroke-width="1.5"/>
  <!-- body cylinder -->
  <rect x="12" y="18" width="24" height="22" fill="url(#brg)" stroke="#083070" stroke-width="1.5"/>
  <!-- dished bottom -->
  <path d="M12,40 Q12,46 24,46 Q36,46 36,40" fill="#1a60a8" stroke="#083070" stroke-width="1.5"/>
  <!-- highlight -->
  <rect x="13" y="19" width="6" height="20" rx="3" fill="white" opacity="0.12"/>
  <!-- jacket -->
  <path d="M10,19 Q10,9 24,9 Q38,9 38,19 L38,40 Q38,46 24,46 Q10,46 10,40 Z" fill="none" stroke="#f07820" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- stirrer shaft -->
  <rect x="22" y="3" width="4" height="10" rx="2" fill="#8090a8" stroke="#405060" stroke-width="1"/>
  <!-- impeller blades -->
  <rect x="14" y="30" width="20" height="3" rx="1.5" fill="white" stroke="#6080a0" stroke-width="0.8" opacity="0.8"/>
  <line x1="17" y1="25" x2="22" y2="30" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="31" y1="25" x2="26" y2="30" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- nozzles -->
  <rect x="2" y="19" width="10" height="4" rx="2" fill="#4a90c0" stroke="#083070" stroke-width="1"/>
  <rect x="36" y="28" width="10" height="4" rx="2" fill="#4a90c0" stroke="#083070" stroke-width="1"/>
</svg>

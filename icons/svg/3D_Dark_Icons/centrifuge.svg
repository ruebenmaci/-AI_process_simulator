<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="cntg" cx="38%" cy="35%">
      <stop offset="0%" stop-color="#b0c0d8"/>
      <stop offset="60%" stop-color="#5060a0"/>
      <stop offset="100%" stop-color="#202848"/>
    </radialGradient>
    <radialGradient id="cntb" cx="38%" cy="35%">
      <stop offset="0%" stop-color="#6090d0"/>
      <stop offset="100%" stop-color="#102060"/>
    </radialGradient>
  </defs>
  <!-- outer casing -->
  <circle cx="24" cy="26" r="17" fill="url(#cntg)" stroke="#202848" stroke-width="1.8"/>
  <ellipse cx="20" cy="21" rx="6" ry="5" fill="white" opacity="0.15"/>
  <!-- bowl inner -->
  <circle cx="24" cy="26" r="10" fill="url(#cntb)" stroke="#102060" stroke-width="1.2"/>
  <!-- spin arms -->
  <line x1="24" y1="26" x2="24" y2="17" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="24" y1="26" x2="32" y2="31" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="24" y1="26" x2="16" y2="31" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <circle cx="24" cy="26" r="3.5" fill="#80b0e0" stroke="white" stroke-width="1"/>
  <!-- drive motor top -->
  <rect x="20" y="4" width="8" height="9" rx="3" fill="#f07820" stroke="#a03010" stroke-width="1.2"/>
  <rect x="21" y="5" width="5" height="3" rx="1" fill="white" opacity="0.2"/>
  <!-- shaft -->
  <rect x="22" y="7" width="4" height="6" rx="1" fill="#c05010" stroke="#803010" stroke-width="0.8"/>
  <!-- outlet nozzles -->
  <rect x="38" y="32" width="8" height="5" rx="2.5" fill="#4a90c0" stroke="#083070" stroke-width="1"/>
  <rect x="38" y="22" width="8" height="5" rx="2.5" fill="#c08030" stroke="#804010" stroke-width="1"/>
  <!-- inlet -->
  <rect x="19" y="2" width="10" height="5" rx="2.5" fill="#5090c0" stroke="#083070" stroke-width="1"/>
</svg>

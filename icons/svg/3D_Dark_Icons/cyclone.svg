<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="cyg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8090a8"/>
      <stop offset="50%" stop-color="#b0c0d8"/>
      <stop offset="100%" stop-color="#404858"/>
    </linearGradient>
    <linearGradient id="cycg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8090a8"/>
      <stop offset="100%" stop-color="#303848"/>
    </linearGradient>
  </defs>
  <!-- cylinder top section -->
  <ellipse cx="24" cy="10" rx="12" ry="4" fill="#5060a0" stroke="#303848" stroke-width="1.5"/>
  <rect x="12" y="10" width="24" height="16" fill="url(#cyg)" stroke="#303848" stroke-width="1.5"/>
  <ellipse cx="24" cy="26" rx="12" ry="4" fill="url(#cyg)" stroke="#303848" stroke-width="1.5"/>
  <rect x="13" y="11" width="8" height="10" rx="4" fill="white" opacity="0.15"/>
  <!-- cone section -->
  <polygon points="12,26 36,26 28,46 20,46" fill="url(#cycg)" stroke="#303848" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- inner dip tube -->
  <rect x="20" y="6" width="8" height="18" rx="1" fill="#202838" stroke="#404858" stroke-width="1" opacity="0.8"/>
  <ellipse cx="24" cy="6" rx="4" ry="2" fill="#303848" stroke="#404858" stroke-width="1"/>
  <!-- gas outlet (top) -->
  <rect x="20" y="2" width="8" height="5" rx="2.5" fill="#5cb85c" stroke="#2a7a2a" stroke-width="1"/>
  <!-- tangential inlet (right) -->
  <rect x="36" y="12" width="10" height="5" rx="2.5" fill="#5090c0" stroke="#083070" stroke-width="1"/>
  <!-- solids outlet (bottom) -->
  <rect x="21" y="44" width="6" height="4" rx="2" fill="#c08030" stroke="#804010" stroke-width="1"/>
</svg>

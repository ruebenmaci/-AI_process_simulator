<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- simplified column - dashed outline (shortcut model) -->
  <rect x="16" y="6" width="16" height="36" rx="4" fill="#f0f4fa" stroke="#2a4060" stroke-width="2" stroke-dasharray="4,2"/>
  <!-- single theoretical tray indicator -->
  <line x1="16" y1="24" x2="32" y2="24" stroke="#e8a020" stroke-width="1.5"/>
  <!-- SC badge -->
  <circle cx="24" cy="24" r="6" fill="#dce8f5" stroke="#e8a020" stroke-width="1.5"/>
  <text x="24" y="27" text-anchor="middle" font-size="7" fill="#e8a020" font-family="monospace" font-weight="bold">SC</text>
  <!-- nozzles -->
  <line x1="24" y1="6" x2="24" y2="2" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="24,2 21,6 27,6" fill="#3a8fd1"/>
  <line x1="24" y1="42" x2="24" y2="46" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="24,46 21,42 27,42" fill="#3a8fd1"/>
  <line x1="4" y1="24" x2="16" y2="24" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="16,24 12,22 12,26" fill="#3a8fd1"/>
</svg>

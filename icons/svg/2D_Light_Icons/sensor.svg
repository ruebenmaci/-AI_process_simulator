<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- diamond shape (instrument standard) -->
  <circle cx="24" cy="24" r="14" fill="#f0f4fa" stroke="#2a4060" stroke-width="2"/>
  <!-- inner ring -->
  <circle cx="24" cy="24" r="9" fill="none" stroke="#3a8fd1" stroke-width="1"/>
  <!-- measurement label -->
  <text x="24" y="22" text-anchor="middle" font-size="7" fill="#3a8fd1" font-family="monospace" font-weight="bold">PT</text>
  <text x="24" y="30" text-anchor="middle" font-size="6" fill="#4a5a70" font-family="monospace">101</text>
  <!-- signal wire -->
  <line x1="24" y1="38" x2="24" y2="45" stroke="#3a8fd1" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="38" y1="24" x2="45" y2="24" stroke="#4a5a70" stroke-width="1" stroke-dasharray="2,2"/>
</svg>

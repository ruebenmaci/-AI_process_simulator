<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- furnace box -->
  <rect x="8" y="10" width="32" height="30" rx="3" fill="#f0f4fa" stroke="#2a4060" stroke-width="2"/>
  <!-- stack (chimney) -->
  <rect x="20" y="3" width="8" height="9" rx="2" fill="#f0f4fa" stroke="#2a4060" stroke-width="1.5"/>
  <!-- smoke puffs -->
  <circle cx="21" cy="2" r="2" fill="#4a5a70" opacity="0.5"/>
  <circle cx="25" cy="1" r="1.5" fill="#4a5a70" opacity="0.4"/>
  <!-- burner flames -->
  <path d="M14,38 Q13,32 17,29 Q15,34 19,31 Q17,37 21,34 Q19,40 14,38Z" fill="#e8a020"/>
  <path d="M22,38 Q21,33 25,30 Q23,35 27,32 Q25,38 22,38Z" fill="#d9534f" opacity="0.9"/>
  <path d="M28,38 Q27,32 31,30 Q29,35 33,32 Q31,37 28,38Z" fill="#e8a020" opacity="0.8"/>
  <!-- burner base line -->
  <line x1="10" y1="38" x2="38" y2="38" stroke="#4a5a70" stroke-width="1.5"/>
  <!-- coil tubes (radiant section) -->
  <path d="M11,25 Q24,20 37,25" fill="none" stroke="#2a4060" stroke-width="1.5"/>
  <path d="M11,29 Q24,24 37,29" fill="none" stroke="#2a4060" stroke-width="1.5"/>
  <!-- inlet/outlet -->
  <line x1="3" y1="25" x2="8" y2="25" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="8,25 5,23 5,27" fill="#3a8fd1"/>
  <line x1="40" y1="25" x2="45" y2="25" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="45,25 42,23 42,27" fill="#3a8fd1"/>
</svg>

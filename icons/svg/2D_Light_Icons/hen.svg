<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- hot stream horizontal -->
  <line x1="4" y1="16" x2="44" y2="16" stroke="#d9534f" stroke-width="2"/>
  <polygon points="44,16 40,14 40,18" fill="#d9534f"/>
  <!-- cold stream horizontal -->
  <line x1="44" y1="32" x2="4" y2="32" stroke="#5aafe8" stroke-width="2"/>
  <polygon points="4,32 8,30 8,34" fill="#5aafe8"/>
  <!-- HX match 1 -->
  <circle cx="16" cy="16" r="5" fill="#f0f4fa" stroke="#d9534f" stroke-width="1.5"/>
  <circle cx="16" cy="32" r="5" fill="#f0f4fa" stroke="#5aafe8" stroke-width="1.5"/>
  <line x1="16" y1="21" x2="16" y2="27" stroke="#2a4060" stroke-width="1.5"/>
  <!-- HX match 2 -->
  <circle cx="32" cy="16" r="5" fill="#f0f4fa" stroke="#d9534f" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="5" fill="#f0f4fa" stroke="#5aafe8" stroke-width="1.5"/>
  <line x1="32" y1="21" x2="32" y2="27" stroke="#2a4060" stroke-width="1.5"/>
</svg>

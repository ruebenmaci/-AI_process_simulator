<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect x="8" y="16" width="32" height="16" rx="8" fill="#f0f4fa" stroke="#2a4060" stroke-width="2"/>
  <!-- tube pass -->
  <line x1="8" y1="24" x2="40" y2="24" stroke="#5aafe8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- cooling water in/out (blue) -->
  <line x1="3" y1="19" x2="8" y2="19" stroke="#5aafe8" stroke-width="2"/>
  <polygon points="8,19 5,17 5,21" fill="#5aafe8"/>
  <line x1="40" y1="29" x2="45" y2="29" stroke="#5aafe8" stroke-width="2"/>
  <polygon points="45,29 42,27 42,31" fill="#5aafe8"/>
  <!-- vapor in / liquid out -->
  <line x1="3" y1="29" x2="8" y2="29" stroke="#5cb85c" stroke-width="2"/>
  <polygon points="8,29 5,27 5,31" fill="#5cb85c"/>
  <line x1="40" y1="19" x2="45" y2="19" stroke="#3a8fd1" stroke-width="2"/>
  <polygon points="45,19 42,17 42,21" fill="#3a8fd1"/>
  <!-- snowflake dot -->
  <circle cx="24" cy="24" r="3" fill="none" stroke="#5aafe8" stroke-width="1.5"/>
  <line x1="24" y1="20" x2="24" y2="28" stroke="#5aafe8" stroke-width="1"/>
  <line x1="20" y1="24" x2="28" y2="24" stroke="#5aafe8" stroke-width="1"/>
</svg>
